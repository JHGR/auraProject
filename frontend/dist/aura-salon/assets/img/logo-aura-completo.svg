<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Montserrat:wght@300;400;600&amp;display=swap');
    </style>
    <path id="topArc"
      d="M 30,120 A 90,90 0 0,1 210,120" />
    <path id="bottomArc"
      d="M 50,145 A 80,80 0 0,0 190,145" />
  </defs>

  <!-- Pink brush stroke effect behind text -->
  <ellipse cx="120" cy="120" rx="72" ry="30" fill="#fad2dd" opacity="0.55" transform="rotate(-5 120 120)"/>

  <!-- Outer circle border -->
  <circle cx="120" cy="120" r="105" fill="none" stroke="#ae9cca" stroke-width="2.5"/>
  <!-- Inner circle border -->
  <circle cx="120" cy="120" r="98" fill="none" stroke="#dcc9a6" stroke-width="1"/>

  <!-- Circular text top -->
  <text font-family="Montserrat, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="3.5" fill="#ae9cca">
    <textPath href="#topArc" startOffset="6%">HAIR · MAKE UP · EXTENSIONES</textPath>
  </text>

  <!-- Circular text bottom -->
  <text font-family="Montserrat, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="4" fill="#dcc9a6">
    <textPath href="#bottomArc" startOffset="14%">SALA DE BELLEZA</textPath>
  </text>

  <!-- Vertical line left -->
  <line x1="106" y1="90" x2="106" y2="150" stroke="#ae9cca" stroke-width="1.2"/>
  <!-- Vertical line right -->
  <line x1="134" y1="90" x2="134" y2="150" stroke="#ae9cca" stroke-width="1.2"/>
  <!-- Horizontal line top -->
  <line x1="86" y1="104" x2="154" y2="104" stroke="#ae9cca" stroke-width="1.2"/>
  <!-- Horizontal line bottom -->
  <line x1="86" y1="136" x2="154" y2="136" stroke="#ae9cca" stroke-width="1.2"/>

  <!-- AURA letters -->
  <text x="120" y="128"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="44" font-weight="700"
    text-anchor="middle"
    letter-spacing="4"
    fill="#ae9cca">AURA</text>
</svg>
