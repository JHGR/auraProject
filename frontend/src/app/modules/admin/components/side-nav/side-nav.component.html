<div class="sidenav-wrapper" [class.collapsed]="collapsed" [class.mobile-open]="mobileOpen">
    <nav class="sidenav shadow-right" (click)="$event.stopPropagation()">
        <!-- Header simplificado -->
        <div class="sidenav-header text-center py-3 border-bottom">
            <div *ngIf="!collapsed" class="sidenav-logo-full">
                <img src="assets/img/logo-aura-blanco.svg" alt="Aura Sala de Belleza" style="height: 52px; width: auto;">
            </div>
            <div *ngIf="collapsed" class="sidenav-header-icon">
                <img src="assets/img/logo-aura-blanco.svg" alt="Aura" style="height: 36px; width: 36px; object-fit: contain;">
            </div>
        </div>
        
        <div class="sidenav-menu">
            <div class="nav">
                <ng-container *ngFor="let section of menuItems">
                    <div class="sidenav-menu-heading">{{section.text}}</div>
                    <ng-container *ngFor="let item of section.items">
                        <a class="nav-link" [routerLink]="item.link" routerLinkActive="active" (click)="onNavItemClick()">
                            <div class="nav-link-icon"><i [class]="item.icon"></i></div>
                            <span class="nav-text">{{item.text}}</span>
                        </a>
                    </ng-container>
                </ng-container>
            </div>
        </div>
        <div class="sidenav-footer">
            <!-- Footer completo: solo cuando sidebar está expandido (desktop) -->
            <div class="sidenav-footer-content" *ngIf="!collapsed">
                <div class="sidenav-footer-subtitle">Usuario:</div>
                <div class="sidenav-footer-title">{{(auth.user$ | async)?.username || 'Admin'}}</div>
                <button class="btn btn-danger btn-sm mt-2" (click)="logout()">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </button>
            </div>
            <!-- Footer compacto: tablet colapsada y overlay móvil -->
            <div class="sidenav-footer-compact" *ngIf="collapsed">
                <div class="user-avatar-mini" title="{{(auth.user$ | async)?.username || 'Admin'}}">
                    {{((auth.user$ | async)?.username || 'A')[0].toUpperCase()}}
                </div>
                <button class="btn-logout-compact" (click)="logout()" title="Cerrar sesión">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>
    <!-- Backdrop para mobile -->
    <div class="sidenav-backdrop" *ngIf="mobileOpen" (click)="requestClose.emit()"></div>
</div>
