<div class="container-fluid">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
      <a routerLink="/admin/inventarios" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i>Volver
      </a>
      <h5 class="mb-0"><i class="fas fa-tags me-2 text-primary"></i>Departamentos</h5>
    </div>
    <button class="btn btn-primary btn-sm" (click)="nuevo()" *ngIf="!modoForm">
      <i class="fas fa-plus me-1"></i>Nuevo departamento
    </button>
  </div>

  <!-- Formulario inline -->
  <div class="card mb-3 border-primary" *ngIf="modoForm">
    <div class="card-header py-2 fw-semibold">
      {{modoForm === 'editar' ? 'Editar departamento' : 'Nuevo departamento'}}
    </div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-12 col-md-4">
          <label class="form-label">Nombre <span class="text-danger">*</span></label>
          <input type="text" class="form-control" [(ngModel)]="form.nombre" placeholder="Ej. Papelería">
        </div>
        <div class="col-12 col-md-5">
          <label class="form-label">Descripción</label>
          <input type="text" class="form-control" [(ngModel)]="form.descripcion" placeholder="Opcional">
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label">Color</label>
          <div class="d-flex align-items-center gap-2">
            <span class="rounded-circle border" style="width:28px;height:28px;flex-shrink:0"
                  [style.background-color]="form.color"></span>
            <input type="color" class="form-control form-control-color" [(ngModel)]="form.color" style="width:44px;height:34px;padding:2px">
          </div>
          <div class="d-flex flex-wrap gap-1 mt-2">
            <span *ngFor="let c of coloresPreset" class="rounded-circle border" style="width:20px;height:20px;cursor:pointer"
                  [style.background-color]="c" [class.border-dark]="form.color === c" (click)="seleccionarColor(c)"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="card-footer d-flex gap-2 justify-content-end py-2">
      <button class="btn btn-outline-secondary btn-sm" (click)="cancelar()">Cancelar</button>
      <button class="btn btn-primary btn-sm" (click)="guardar()" [disabled]="guardando">
        <span *ngIf="guardando" class="spinner-border spinner-border-sm me-1"></span>
        Guardar
      </button>
    </div>
  </div>

  <!-- Spinner carga -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <!-- Lista de departamentos -->
  <div *ngIf="!loading">
    <div *ngIf="departamentos.length === 0" class="text-center py-5 text-muted">
      <i class="fas fa-tags fa-3x mb-2 opacity-25"></i>
      <p>No hay departamentos. Crea el primero para organizar tus artículos.</p>
    </div>

    <div class="row g-2">
      <div class="col-12 col-md-6 col-xl-4" *ngFor="let d of departamentos">
        <div class="card h-100">
          <div class="card-body d-flex align-items-center gap-3 py-2">
            <span class="rounded-circle flex-shrink-0" style="width:36px;height:36px"
                  [style.background-color]="d.color || '#6c757d'"></span>
            <div class="flex-grow-1 overflow-hidden">
              <div class="fw-semibold text-truncate">{{d.nombre}}</div>
              <div class="text-muted small text-truncate">{{d.descripcion || '—'}}</div>
              <div class="text-muted small">{{d.total_articulos || 0}} artículo(s)</div>
            </div>
            <div class="d-flex gap-1 flex-shrink-0">
              <button class="btn btn-sm btn-outline-warning" title="Editar" (click)="editar(d)"><i class="fas fa-edit"></i></button>
              <button class="btn btn-sm btn-outline-danger" title="Eliminar" (click)="eliminar(d)"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
