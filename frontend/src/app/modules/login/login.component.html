<div class="auth-layout">
  <div class="container-xl px-4">
    <div class="row gx-4 justify-content-center">
      <div class="col-lg-5">        
        <div class="card shadow-lg border-0 rounded-lg mt-5">
          <div class="card-header justify-content-center">
            <!-- Logo de la empresa dentro del formulario -->
            <div class="text-center mb-3 mt-2">
              <img src="assets/img/logo-aura-completo.svg" alt="Aura Sala de Belleza" class="img-fluid login-logo" style="max-height: 160px; width: auto;">
            </div>
            <h3 class="my-3">Iniciar sesión</h3>
            <p class="mb-2">Sistema de Gestión</p>
          </div>
          <div class="card-body">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label class="small mb-1" for="inputIdentifier">Usuario o correo</label>
                <input class="form-control" id="inputIdentifier" data-cy="identifierInput" type="text" placeholder="Usuario o correo" aria-describedby="identifierHelp" formControlName="identifier" [class.is-valid]="identifierControlValid" [class.is-invalid]="identifierControlInvalid" />
                <div class="invalid-feedback" *ngIf='identifierControl.hasError("required")'>El usuario o correo es obligatorio.</div>
              </div>
              <div class="mb-3">
                <label class="small mb-1" for="inputPassword">Contraseña</label>
                <div class="input-group">
                  <input class="form-control" id="inputPassword" data-cy="passwordInput" [type]="isPasswordVisible ? 'text' : 'password'" placeholder="Contraseña" formControlName="password" [class.is-valid]="passwordControlValid" [class.is-invalid]="passwordControlInvalid" />
                  <button class="btn btn-outline-secondary" type="button" aria-label="Mostrar contraseña" title="Mantener presionado para ver" 
                    (mousedown)="showPassword()" (mouseup)="hidePassword()" (mouseleave)="hidePassword()"
                    (touchstart)="showPassword(); $event.preventDefault()" (touchend)="hidePassword()">
                    <i [class]="isPasswordVisible ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                  </button>
                </div>
                <div class="invalid-feedback" *ngIf='passwordControl.hasError("required")'>La contraseña es obligatoria.</div>
                <div class="invalid-feedback" *ngIf='passwordControl.hasError("minlength")'>La contraseña debe tener al menos 8 caracteres.</div>
              </div>
              <div class="mb-3">
                <div class="form-check"><input class="form-check-input" id="rememberPasswordCheck" data-cy="rememberPasswordCheck" type="checkbox" formControlName="checkbox" /><label class="form-check-label" for="rememberPasswordCheck">Recordar contraseña</label></div>
              </div>
              <div class="d-flex align-items-center justify-content-end mt-4"><button class="btn btn-primary" data-cy="loginButton" type="submit" [disabled]="loginForm.invalid">Iniciar sesión</button></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
